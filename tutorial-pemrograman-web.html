<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav></nav>

    <section id="tutorial">
      <div class="container my-5">
        <div class="row" id="container-tutorial-web"></div>
      </div>
    </section>

    <div
      class="modal fade"
      id="modalDetailTutorial"
      tabindex="-1"
      aria-labelledby="modalDetailTutorialLabel"
      aria-hidden="true"
    >
      <div
        class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable"
      >
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="modalDetailTutorialLabel"></h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="tutorial-detail-modal">
              <div class="row">
                <div class="col-lg-4">
                  <img
                    src=""
                    alt="Logo HTML - Tutorial Pemrograman Web - Ibnu Ahmad Fauzi"
                    class="w-100"
                  />
                </div>
                <div class="col-lg-8">
                  <table class="table table-bordered">
                    <tr>
                      <td>
                        <b>Judul</b>
                      </td>
                      <td class="detail-judul"></td>
                    </tr>
                    <tr>
                      <td>
                        <b>Bahasa</b>
                      </td>
                      <td class="detail-bahasa"></td>
                    </tr>
                    <tr>
                      <td>
                        <b>Penyusun</b>
                      </td>
                      <td class="detail-penyusun"></td>
                    </tr>
                    <tr>
                      <td>
                        <b>Jenis Konten</b>
                      </td>
                      <td class="detail-konten"></td>
                    </tr>
                    <tr>
                      <td>
                        <b>Terakhir Diperbarui</b>
                      </td>
                      <td class="detail-update"></td>
                    </tr>
                    <tr>
                      <td>
                        <b>Jumlah Halaman</b>
                      </td>
                      <td class="detail-halaman"></td>
                    </tr>
                    <tr>
                      <td colspan="2">
                        <b>Deskripsi :</b>
                        <p style="text-align: justify">
                          <small class="detail-deskripsi"></small>
                        </p>
                      </td>
                    </tr>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary btn-sm"
              data-bs-dismiss="modal"
            >
              Tutup
            </button>
            <a href="" class="btn btn-primary btn-sm detail-link">
              Mulai Belajar
            </a>
          </div>
        </div>
      </div>
    </div>

    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"
      integrity="sha512-+k1pnlgt4F1H8L7t3z95o3/KO+o78INEcXTbnoJQ/F2VqDVhWoaiVml/OEHv9HsVgxUaVW+IbiZPUJQfF/YxZw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js"
      integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script src="/utils/data-tutorial.js"></script>
    <script src="js/script.js"></script>
    <script src="js/script-tutorial.js"></script>
    <script src="js/tutorial-pemrograman-web.js"></script>
  </body>
</html>
