<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav></nav>

    <section id="penilaian-guru-pamong">
      <div class="container">
        <div class="mb-4">
          <h1>Penilaian Guru Pamong - 3 Siklus</h1>
          <h3>
            Lampiran 7 (Perangkat Pembelajaran) & Lampiran 8 (Praktik Mengajar)
          </h3>
        </div>
        <div class="row justify-content-center">
          <div class="col-lg-4">
            <div class="card" style="width: 100%">
              <div class="card-body text-center">
                <h1><i class="fa-solid fa-database"></i></h1>
                <h5 class="card-title">
                  Variabel, Tipe Data, dan Operator (JavaScript)
                </h5>
                <h6 class="card-subtitle mb-5 text-body-secondary">Siklus 1</h6>
                <button
                  class="btn btn-sm btn-primary btn-lampiran7-siklus1 me-3"
                >
                  <i class="fa-solid fa-file-pdf"></i> Lampiran 7
                </button>
                <button
                  class="btn btn-sm btn-primary btn-lampiran8-siklus1 me-3"
                >
                  <i class="fa-solid fa-file-pdf"></i> lampiran 8
                </button>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card" style="width: 100%">
              <div class="card-body text-center">
                <h1><i class="fa-solid fa-arrows-spin"></i></h1>
                <h5 class="card-title">
                  Percabangan, Perulangan, dan Function (JavaScript)
                </h5>
                <h6 class="card-subtitle mb-5 text-body-secondary">Siklus 2</h6>
                <button
                  class="btn btn-sm btn-primary btn-lampiran7-siklus2 me-3"
                >
                  <i class="fa-solid fa-file-pdf"></i> Lampiran 7
                </button>
                <button
                  class="btn btn-sm btn-primary btn-lampiran8-siklus2 me-3"
                >
                  <i class="fa-solid fa-file-pdf"></i> lampiran 8
                </button>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card" style="width: 100%">
              <div class="card-body text-center">
                <h1><i class="fa-solid fa-object-ungroup"></i></h1>
                <h5 class="card-title">
                  Array, Object, Document Object Model (JavaScript)
                </h5>
                <h6 class="card-subtitle mb-5 text-body-secondary">Siklus 3</h6>
                <button
                  class="btn btn-sm btn-primary btn-lampiran7-siklus3 me-3"
                >
                  <i class="fa-solid fa-file-pdf"></i> Lampiran 7
                </button>
                <button
                  class="btn btn-sm btn-primary btn-lampiran8-siklus3 me-3"
                >
                  <i class="fa-solid fa-file-pdf"></i> lampiran 8
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div
      class="modal fade"
      id="modalPenilaianGuruPamong"
      tabindex="-1"
      aria-labelledby="modalPenilaianGuruPamongLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-fullscreen modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="modalPenilaianGuruPamongLabel">
              Modal title
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <iframe
              id="modalPenilaianGuruPamongIframe"
              src=""
              style="width: 100%; height: 80vh"
            ></iframe>
          </div>
        </div>
      </div>
    </div>

    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"
      integrity="sha512-+k1pnlgt4F1H8L7t3z95o3/KO+o78INEcXTbnoJQ/F2VqDVhWoaiVml/OEHv9HsVgxUaVW+IbiZPUJQfF/YxZw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js"
      integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script src="js/script.js"></script>
    <script src="js/penilaian-siklus.js"></script>
  </body>
</html>
